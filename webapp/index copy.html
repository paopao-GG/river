<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPE River Monitor</title>

  <!-- Firebase compat SDK (works with plain script tags, no bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Chart.js + date adapter for time-series X axis -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1923;
      color: #e0e6ed;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #1a2634;
      border-bottom: 2px solid #0d7377;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #4fc3f7;
      letter-spacing: 0.5px;
    }
    header h1 span { color: #81d4fa; font-weight: 400; }
    #last-refresh {
      font-size: 0.78rem;
      color: #7a9bb5;
    }

    /* ── Alert Banner ────────────────────────────────────── */
    #alert-banner {
      display: none;
      background: #c0392b;
      color: #fff;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 2px solid #e74c3c;
    }
    #alert-banner.active { display: block; }
    #alert-text { margin-right: 12px; }
    #alert-close {
      cursor: pointer;
      opacity: 0.8;
      background: none;
      border: none;
      color: #fff;
      font-size: 1rem;
      float: right;
    }

    /* ── Main Layout ─────────────────────────────────────── */
    main { padding: 20px; max-width: 1200px; margin: 0 auto; }

    /* ── Node Cards ──────────────────────────────────────── */
    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .node-card {
      background: #1a2634;
      border-radius: 10px;
      border-top: 4px solid #0d7377;
      padding: 18px;
      transition: border-color 0.3s;
    }
    .node-card.alert  { border-top-color: #e74c3c; }
    .node-card.offline { border-top-color: #7f8c8d; opacity: 0.75; }

    .node-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #7a9bb5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* Status dot */
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #7f8c8d;        /* grey = no data yet */
      transition: background 0.4s;
    }
    .status-dot.online  { background: #27ae60; box-shadow: 0 0 5px #27ae6088; }
    .status-dot.offline { background: #e74c3c; box-shadow: 0 0 5px #e74c3c88; }
    .node-card .node-id {
      font-size: 0.72rem;
      color: #4a6278;
      margin-bottom: 14px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .metric-label {
      font-size: 0.78rem;
      color: #7a9bb5;
    }
    .metric-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e0e6ed;
    }
    .metric-unit {
      font-size: 0.72rem;
      color: #7a9bb5;
      margin-left: 3px;
    }

    /* Water level value -- turns red when alert */
    .node-card.alert .wl-value { color: #e74c3c; }


    /* Footer meta */
    .card-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #253545;
      font-size: 0.72rem;
      color: #4a6278;
    }
    .last-seen.stale { color: #e74c3c; }

    /* ── Chart Section ───────────────────────────────────── */
    .chart-section {
      background: #1a2634;
      border-radius: 10px;
      padding: 18px;
    }
    .chart-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }
    .chart-controls label {
      font-size: 0.78rem;
      color: #7a9bb5;
      margin-right: 4px;
    }
    .chart-controls select {
      background: #253545;
      color: #e0e6ed;
      border: 1px solid #2c3e50;
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .range-btns { display: flex; gap: 6px; }
    .range-btn {
      background: #253545;
      color: #7a9bb5;
      border: 1px solid #2c3e50;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .range-btn.active, .range-btn:hover {
      background: #0d7377;
      color: #fff;
      border-color: #0d7377;
    }
    .chart-wrapper { position: relative; height: 320px; }

    .chart-section h3 {
      font-size: 0.92rem;
      font-weight: 600;
      color: #4fc3f7;
      margin-bottom: 12px;
    }
    .chart-section + .chart-section { margin-top: 20px; }

    .prediction-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
      font-size: 0.76rem;
      color: #7a9bb5;
    }
    .prediction-legend span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 2px;
      display: inline-block;
    }
    .legend-line.dashed {
      background: repeating-linear-gradient(90deg, currentColor 0 5px, transparent 5px 9px);
      height: 2px;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      header h1 { font-size: 1rem; }
      .metric-value { font-size: 1.1rem; }
    }
  </style>
</head>

<body>
  <header>
    <h1>CPE <span>River Monitor</span></h1>
    <div id="last-refresh">Last refresh: --</div>
  </header>

  <div id="alert-banner">
    <span id="alert-text"></span>
    <button id="alert-close" onclick="dismissAlert()">&#x2715;</button>
  </div>

  <main>
    <!-- Node cards (generated by JS) -->
    <div class="node-grid" id="node-grid"></div>

    <!-- Historical Chart section -->
    <div class="chart-section">
      <h3>Historical Data</h3>
      <div class="chart-controls">
        <div>
          <label for="node-select">Node:</label>
          <select id="node-select" onchange="onNodeSelect()">
            <option value="all">All Stations</option>
            <option value="station-01">Station 01</option>
            <option value="station-02">Station 02</option>
            <option value="station-03">Station 03</option>
          </select>
        </div>
        <div>
          <label>Metric:</label>
          <select id="metric-select" onchange="reloadChart()">
            <option value="waterLevel_cm">Water Level (cm)</option>
            <option value="flowRate_lpm">Flow Rate (L/min)</option>
          </select>
        </div>
        <div class="range-btns">
          <button class="range-btn active" onclick="setRange(1, this)">1H</button>
          <button class="range-btn" onclick="setRange(6, this)">6H</button>
          <button class="range-btn" onclick="setRange(24, this)">24H</button>
          <button class="range-btn" onclick="setRange(168, this)">7D</button>
          <button class="range-btn" onclick="setRange(720, this)">30D</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- Prediction Chart section -->
    <div class="chart-section">
      <h3>Water Level Prediction</h3>
      <div class="chart-controls">
        <div>
          <label for="pred-node-select">Node:</label>
          <select id="pred-node-select" onchange="reloadPrediction()">
            <option value="station-01">Station 01</option>
            <option value="station-02">Station 02</option>
            <option value="station-03">Station 03</option>
          </select>
        </div>
        <div>
          <label>History:</label>
          <select id="pred-history-select" onchange="reloadPrediction()">
            <option value="1">Last 1 Hour</option>
            <option value="6" selected>Last 6 Hours</option>
            <option value="24">Last 24 Hours</option>
          </select>
        </div>
        <div>
          <label>Forecast:</label>
          <select id="pred-forecast-select" onchange="reloadPrediction()">
            <option value="30">30 min</option>
            <option value="60" selected>1 hour</option>
            <option value="180">3 hours</option>
            <option value="360">6 hours</option>
          </select>
        </div>
      </div>
      <div class="prediction-legend">
        <span><span class="legend-line" style="background:#4fc3f7"></span> Actual</span>
        <span><span class="legend-line dashed" style="color:#ff7043"></span> Predicted (trend)</span>
        <span><span class="legend-line" style="background:#ff704333; height:12px; width:22px; border-radius:2px;"></span> Confidence band</span>
      </div>
      <div class="chart-wrapper">
        <canvas id="pred-chart"></canvas>
      </div>
    </div>
  </main>

  <script>
    // ================================================================
    // TODO: REPLACE with your Firebase project config
    // Get from: Firebase Console > Project Settings > General > Your apps
    // ================================================================
    const firebaseConfig = {
      apiKey:            "AIzaSyC0rNq9LGrIvzg20-7kAgfWnf1TqDt8eOM",
      authDomain:        "river-d1bc6.firebaseapp.com",
      databaseURL:       "https://river-d1bc6-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "river-d1bc6",
      storageBucket:     "river-d1bc6.firebasestorage.app",
      messagingSenderId: "310431095227",
      appId:             "1:310431095227:web:81d23b3372af06e8c68c9e"
    };

    // ================================================================
    // CONFIGURATION
    // ================================================================
    const STATION_IDS = ["station-01", "station-02", "station-03"];
    const STATION_COLORS = {
      "station-01": "#4fc3f7",
      "station-02": "#81c784",
      "station-03": "#ffb74d"
    };

    // State
    let db;
    let nodeConfigs  = {};
    let latestData   = {};
    let activeAlerts = new Set();
    let chartHours   = 1;
    let chart;
    let predChart;

    // ================================================================
    // INIT
    // ================================================================
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();

    buildNodeCards();
    initChart();
    initPredChart();
    startListeners();

    // ================================================================
    // Build the 3 node card DOM elements
    // ================================================================
    function buildNodeCards() {
      const grid = document.getElementById('node-grid');
      STATION_IDS.forEach(id => {
        const card = document.createElement('div');
        card.className = 'node-card';
        card.id = 'card-' + id;
        card.innerHTML = `
          <h2><span class="status-dot" id="dot-${id}"></span><span class="card-location" id="loc-${id}">Loading...</span></h2>
          <div class="node-id">${id}</div>

          <div class="metric-row">
            <span class="metric-label">Water Level</span>
            <span>
              <span class="metric-value wl-value" id="wl-${id}">--</span>
              <span class="metric-unit">cm</span>
            </span>
          </div>

          <div class="metric-row">
            <span class="metric-label">Flow Rate</span>
            <span>
              <span class="metric-value" id="fr-${id}">--</span>
              <span class="metric-unit">L/min</span>
            </span>
          </div>

          <div class="card-footer">
            <span>RSSI: <span id="rs-${id}">--</span> dBm</span>
            <span class="last-seen" id="ls-${id}">never</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // ================================================================
    // Start Firebase real-time listeners for each node
    // ================================================================
    function startListeners() {
      STATION_IDS.forEach(nodeId => {
        // Load config once
        db.ref(`devices/${nodeId}/config`).once('value', snap => {
          if (snap.exists()) {
            nodeConfigs[nodeId] = snap.val();
            const loc = snap.val().location || nodeId;
            document.getElementById('loc-' + nodeId).textContent = loc;
          }
        });

        // Real-time listener for the latest reading
        // Using 'value' (not 'child_added') so it fires reliably on load + every update
        db.ref(`devices/${nodeId}/readings`)
          .orderByKey()
          .limitToLast(1)
          .on('value', snap => {
            if (!snap.exists()) return;
            snap.forEach(child => {
              updateNodeCard(nodeId, child.val());
            });
          });
      });

      // Refresh "last seen" timers every 30 seconds
      setInterval(refreshTimestamps, 30000);
    }

    // ================================================================
    // Update a node card with the latest reading
    // ================================================================
    function updateNodeCard(nodeId, data) {
      if (!data) return;
      latestData[nodeId] = data;

      const wl = data.waterLevel_cm != null ? data.waterLevel_cm.toFixed(1) : '--';
      const fr = data.flowRate_lpm  != null ? data.flowRate_lpm.toFixed(1)  : '--';
      const rs = data.rssi_dbm      != null ? data.rssi_dbm                  : '--';

      document.getElementById('wl-' + nodeId).textContent = wl;
      document.getElementById('fr-' + nodeId).textContent = fr;
      document.getElementById('rs-' + nodeId).textContent = rs;

      // Last seen (Firebase timestamp is in ms)
      if (data.timestamp) {
        const epochSec = data.timestamp / 1000;
        const el = document.getElementById('ls-' + nodeId);
        el.textContent = timeAgo(epochSec);
        const stale = (Date.now() / 1000 - epochSec) > 600;  // 10 min
        el.classList.toggle('stale', stale);
        document.getElementById('card-' + nodeId).classList.toggle('offline', stale);
        const dot = document.getElementById('dot-' + nodeId);
        dot.classList.toggle('online',  !stale);
        dot.classList.toggle('offline',  stale);
      }

      // Alert check
      checkAlert(nodeId, data);

      // Update refresh time
      document.getElementById('last-refresh').textContent =
        'Last refresh: ' + new Date().toLocaleTimeString();

      // Refresh prediction chart if this node is selected
      const predNode = document.getElementById('pred-node-select');
      if (predNode && predNode.value === nodeId) {
        reloadPrediction();
      }
    }

    // ================================================================
    // Refresh "X min ago" labels without re-querying Firebase
    // ================================================================
    function refreshTimestamps() {
      STATION_IDS.forEach(nodeId => {
        const data = latestData[nodeId];
        if (!data || !data.timestamp) return;
        const epochSec = data.timestamp / 1000;
        const el = document.getElementById('ls-' + nodeId);
        el.textContent = timeAgo(epochSec);
        const stale = (Date.now() / 1000 - epochSec) > 600;
        el.classList.toggle('stale', stale);
        document.getElementById('card-' + nodeId).classList.toggle('offline', stale);
        const dot = document.getElementById('dot-' + nodeId);
        dot.classList.toggle('online',  !stale);
        dot.classList.toggle('offline',  stale);
      });
    }

    // ================================================================
    // Alert system -- check water level vs config threshold
    // ================================================================
    function checkAlert(nodeId, data) {
      const cfg = nodeConfigs[nodeId];
      const threshold = cfg ? cfg.alertThreshold_cm : null;
      const wl = data.waterLevel_cm;
      const card = document.getElementById('card-' + nodeId);

      if (threshold != null && wl != null && wl >= threshold) {
        activeAlerts.add(nodeId);
        card.classList.add('alert');
        showAlertBanner();
      } else {
        activeAlerts.delete(nodeId);
        card.classList.remove('alert');
        if (activeAlerts.size === 0) {
          document.getElementById('alert-banner').classList.remove('active');
        } else {
          showAlertBanner();
        }
      }
    }

    function showAlertBanner() {
      const names = [...activeAlerts].map(id => {
        const loc = nodeConfigs[id] ? nodeConfigs[id].location : id;
        const wl  = latestData[id]  ? latestData[id].waterLevel_cm.toFixed(1) : '?';
        const thr = nodeConfigs[id] ? nodeConfigs[id].alertThreshold_cm : '?';
        return `${loc} (${wl}cm >= ${thr}cm)`;
      });
      document.getElementById('alert-text').textContent =
        'WARNING: Water level threshold exceeded at: ' + names.join(', ');
      document.getElementById('alert-banner').classList.add('active');
    }

    function dismissAlert() {
      document.getElementById('alert-banner').classList.remove('active');
    }

    // ================================================================
    // Chart
    // ================================================================
    function initChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#7a9bb5', font: { size: 12 } }
            },
            tooltip: {
              backgroundColor: '#1a2634',
              titleColor: '#4fc3f7',
              bodyColor: '#e0e6ed',
              borderColor: '#2c3e50',
              borderWidth: 1
            }
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'minute', displayFormats: { minute: 'HH:mm', hour: 'MMM d HH:mm' } },
              ticks: { color: '#7a9bb5', maxTicksLimit: 8 },
              grid:  { color: '#1e2d3d' }
            },
            y: {
              ticks: { color: '#7a9bb5' },
              grid:  { color: '#1e2d3d' },
              title: { display: true, color: '#7a9bb5', text: 'Water Level (cm)' }
            }
          }
        }
      });

      reloadChart();
    }

    function setRange(hours, btn) {
      chartHours = hours;
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      reloadChart();
    }

    function onNodeSelect() { reloadChart(); }

    function reloadChart() {
      if (!chart) return;
      const selectedNode  = document.getElementById('node-select').value;
      const selectedMetric = document.getElementById('metric-select').value;
      const metricLabel = selectedMetric === 'waterLevel_cm' ? 'Water Level (cm)' : 'Flow Rate (L/min)';

      chart.options.scales.y.title.text = metricLabel;

      const nodesToLoad = selectedNode === 'all' ? STATION_IDS : [selectedNode];
      const startMs = Date.now() - chartHours * 3600 * 1000;
      const startKey = String(Math.floor(startMs));  // Firebase push keys are time-ordered

      chart.data.datasets = [];

      let pending = nodesToLoad.length;

      nodesToLoad.forEach(nodeId => {
        db.ref(`devices/${nodeId}/readings`)
          .orderByChild('timestamp')
          .startAt(startMs)
          .once('value', snap => {
            const points = [];
            snap.forEach(child => {
              const d = child.val();
              if (d.timestamp && d[selectedMetric] != null) {
                points.push({ x: d.timestamp, y: d[selectedMetric] });
              }
            });

            chart.data.datasets.push({
              label: (nodeConfigs[nodeId] ? nodeConfigs[nodeId].location : nodeId),
              data: points,
              borderColor: STATION_COLORS[nodeId] || '#fff',
              backgroundColor: (STATION_COLORS[nodeId] || '#fff') + '22',
              borderWidth: 2,
              pointRadius: points.length > 100 ? 0 : 3,
              tension: 0.3,
              fill: false
            });

            pending--;
            if (pending === 0) chart.update();
          });
      });
    }

    // ================================================================
    // Prediction Chart
    // ================================================================

    function initPredChart() {
      const ctx = document.getElementById('pred-chart').getContext('2d');
      predChart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a2634',
              titleColor: '#4fc3f7',
              bodyColor: '#e0e6ed',
              borderColor: '#2c3e50',
              borderWidth: 1,
              callbacks: {
                label: function(ctx) {
                  if (ctx.dataset.label === 'Confidence') return null;
                  return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + ' cm';
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'minute', displayFormats: { minute: 'HH:mm', hour: 'MMM d HH:mm' } },
              ticks: { color: '#7a9bb5', maxTicksLimit: 10 },
              grid: { color: '#1e2d3d' }
            },
            y: {
              ticks: { color: '#7a9bb5' },
              grid: { color: '#1e2d3d' },
              title: { display: true, color: '#7a9bb5', text: 'Water Level (cm)' }
            }
          }
        }
      });

      reloadPrediction();
    }

    // Linear regression: returns { slope, intercept } for (x, y) pairs
    function linearRegression(points) {
      const n = points.length;
      if (n < 2) return null;

      let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
      for (const p of points) {
        sumX  += p.x;
        sumY  += p.y;
        sumXY += p.x * p.y;
        sumX2 += p.x * p.x;
      }

      const denom = n * sumX2 - sumX * sumX;
      if (Math.abs(denom) < 1e-10) return null;

      const slope     = (n * sumXY - sumX * sumY) / denom;
      const intercept = (sumY - slope * sumX) / n;

      // Standard error for confidence band
      let ssRes = 0;
      for (const p of points) {
        const predicted = slope * p.x + intercept;
        ssRes += (p.y - predicted) * (p.y - predicted);
      }
      const stdErr = Math.sqrt(ssRes / Math.max(n - 2, 1));

      return { slope, intercept, stdErr };
    }

    function reloadPrediction() {
      if (!predChart) return;

      const nodeId      = document.getElementById('pred-node-select').value;
      const historyHrs  = parseInt(document.getElementById('pred-history-select').value);
      const forecastMin = parseInt(document.getElementById('pred-forecast-select').value);

      const startMs = Date.now() - historyHrs * 3600 * 1000;

      db.ref(`devices/${nodeId}/readings`)
        .orderByChild('timestamp')
        .startAt(startMs)
        .once('value', snap => {
          const actual = [];
          snap.forEach(child => {
            const d = child.val();
            if (d.timestamp && d.waterLevel_cm != null) {
              actual.push({ x: d.timestamp, y: d.waterLevel_cm });
            }
          });

          // Need at least 2 points for regression
          if (actual.length < 2) {
            predChart.data.datasets = [{
              label: 'Actual Water Level',
              data: actual,
              borderColor: '#4fc3f7',
              backgroundColor: '#4fc3f722',
              borderWidth: 2,
              pointRadius: 3,
              tension: 0.3,
              fill: false
            }];
            predChart.update();
            return;
          }

          // Normalize timestamps to minutes for numerical stability
          const t0 = actual[0].x;
          const normalized = actual.map(p => ({
            x: (p.x - t0) / 60000,  // minutes from first point
            y: p.y
          }));

          const reg = linearRegression(normalized);
          if (!reg) {
            predChart.data.datasets = [{
              label: 'Actual Water Level',
              data: actual,
              borderColor: '#4fc3f7',
              backgroundColor: '#4fc3f722',
              borderWidth: 2,
              pointRadius: 3,
              tension: 0.3,
              fill: false
            }];
            predChart.update();
            return;
          }

          // Generate prediction points (from last actual to +forecastMin)
          const lastActual = actual[actual.length - 1];
          const forecastMs = forecastMin * 60 * 1000;
          const predStep   = Math.max(forecastMin / 30, 1) * 60000; // step size in ms
          const predPoints = [];
          const upperBand  = [];
          const lowerBand  = [];

          // Confidence grows with distance from data
          const confidence = 1.96; // ~95% interval

          for (let t = lastActual.x; t <= lastActual.x + forecastMs; t += predStep) {
            const tNorm = (t - t0) / 60000;
            const yPred = reg.slope * tNorm + reg.intercept;
            const distFromEnd = (t - lastActual.x) / 60000; // minutes beyond last reading
            const uncertainty = reg.stdErr * confidence * (1 + distFromEnd / (normalized.length * 0.5));

            predPoints.push({ x: t, y: Math.max(0, yPred) });
            upperBand.push({ x: t, y: Math.max(0, yPred + uncertainty) });
            lowerBand.push({ x: t, y: Math.max(0, yPred - uncertainty) });
          }

          // Alert threshold line (if configured)
          const datasets = [];
          const cfg = nodeConfigs[nodeId];
          const threshold = cfg ? cfg.alertThreshold_cm : null;

          // Actual data
          datasets.push({
            label: 'Actual Water Level',
            data: actual,
            borderColor: '#4fc3f7',
            backgroundColor: '#4fc3f722',
            borderWidth: 2,
            pointRadius: actual.length > 100 ? 0 : 3,
            tension: 0.3,
            fill: false
          });

          // Prediction line
          datasets.push({
            label: 'Predicted',
            data: predPoints,
            borderColor: '#ff7043',
            borderWidth: 2,
            borderDash: [6, 4],
            pointRadius: 0,
            tension: 0,
            fill: false
          });

          // Confidence band (upper)
          datasets.push({
            label: 'Confidence',
            data: upperBand,
            borderColor: 'transparent',
            backgroundColor: 'transparent',
            pointRadius: 0,
            fill: false
          });

          // Confidence band (lower -- fill to upper)
          datasets.push({
            label: 'Confidence',
            data: lowerBand,
            borderColor: 'transparent',
            backgroundColor: '#ff704322',
            pointRadius: 0,
            fill: '-1'
          });

          // Alert threshold horizontal line
          if (threshold != null) {
            const chartStart = actual[0].x;
            const chartEnd   = lastActual.x + forecastMs;
            datasets.push({
              label: 'Alert Threshold',
              data: [
                { x: chartStart, y: threshold },
                { x: chartEnd,   y: threshold }
              ],
              borderColor: '#e74c3c',
              borderWidth: 1.5,
              borderDash: [4, 4],
              pointRadius: 0,
              fill: false
            });
          }

          predChart.data.datasets = datasets;
          predChart.update();
        });
    }

    // ================================================================
    // Utility -- relative time formatter
    // ================================================================
    function timeAgo(epochSeconds) {
      const diff = Math.floor(Date.now() / 1000) - epochSeconds;
      if (diff < 0)     return 'just now';
      if (diff < 60)    return diff + 's ago';
      if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }
  </script>
